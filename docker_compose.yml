version: '3.8'

services:
  ash-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: ash-discord-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - GUILD_ID=${GUILD_ID}
      - RESOURCES_CHANNEL_ID=${RESOURCES_CHANNEL_ID}
      - STAFF_PING_USER=${STAFF_PING_USER}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - ash-network

  redis:
    image: redis:7-alpine
    container_name: ash-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - ash-network

volumes:
  redis_data:

networks:
  ash-network:
    driver: bridge